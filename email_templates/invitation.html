<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="ko" xml:lang="ko">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <meta name="supported-color-schemes" content="light" />
  <title>{org_name} 워크스페이스 초대</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
</head>
<body style="margin: 0; padding: 0; background-color: #f1f5f9; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;">

  <!-- 전체 래퍼 -->
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color: #f1f5f9;">
    <tr>
      <td align="center" style="padding-top: 40px; padding-bottom: 40px; padding-left: 16px; padding-right: 16px;">

        <!--[if mso]>
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" align="center"><tr><td>
        <![endif]-->
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width: 600px; margin: 0 auto;">

          <!-- ====== 헤더: 브랜드 영역 ====== -->
          <tr>
            <td align="center" style="background-color: #1e3a8a; padding-top: 36px; padding-bottom: 32px; padding-left: 40px; padding-right: 40px; border-top-left-radius: 12px; border-top-right-radius: 12px;">
              <!-- 로고 아이콘 (큐브) -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="padding-bottom: 12px;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="width: 44px; height: 44px; background-color: #2563eb; border-radius: 10px; text-align: center; vertical-align: middle; font-size: 22px; line-height: 44px; color: #ffffff;">
                          &#9671;
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
                <tr>
                  <td align="center" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 22px; font-weight: 700; color: #ffffff; letter-spacing: -0.3px;">
                    Fabbit
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- ====== 액센트 바: 인디고 라인 ====== -->
          <tr>
            <td style="height: 4px; background-color: #6366f1; font-size: 0; line-height: 0;">&nbsp;</td>
          </tr>

          <!-- ====== 본문 영역 ====== -->
          <tr>
            <td style="background-color: #ffffff; padding-top: 40px; padding-bottom: 16px; padding-left: 40px; padding-right: 40px;">
              <!-- 초대 아이콘 -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td align="center" style="padding-bottom: 28px;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="width: 56px; height: 56px; background-color: #eff6ff; border-radius: 28px; text-align: center; vertical-align: middle; font-size: 26px; line-height: 56px;">
                          &#9993;
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>

              <!-- 제목 -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td align="center" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 700; color: #0f172a; line-height: 28px; padding-bottom: 16px;">
                    워크스페이스에 초대되었습니다
                  </td>
                </tr>
              </table>

              <!-- 안내 문구 -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td align="center" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 15px; color: #475569; line-height: 24px; padding-bottom: 28px;">
                    <strong style="color: #0f172a;">{inviter_name}</strong>님이
                    <strong style="color: #0f172a;">{org_name}</strong> 워크스페이스에서 함께 협업하도록 초대했습니다.
                  </td>
                </tr>
              </table>

              <!-- 조직 정보 카드 -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="margin-bottom: 32px;">
                <tr>
                  <td style="background-color: #f8fafc; border-radius: 8px; border-left-width: 4px; border-left-style: solid; border-left-color: #2563eb; padding-top: 16px; padding-bottom: 16px; padding-left: 20px; padding-right: 20px;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                      <tr>
                        <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; padding-bottom: 4px;">
                          워크스페이스
                        </td>
                      </tr>
                      <tr>
                        <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 17px; font-weight: 700; color: #1e293b;">
                          {org_name}
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>

              <!-- CTA 버튼 -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="margin-bottom: 32px;">
                <tr>
                  <td align="center">
                    <!--[if mso]>
                    <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{invite_url}" style="height:48px;v-text-anchor:middle;width:280px;" arcsize="17%" fillcolor="#2563eb" stroke="f">
                      <w:anchorlock/>
                      <center style="color:#ffffff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:15px;font-weight:600;">초대 수락하기</center>
                    </v:roundrect>
                    <![endif]-->
                    <!--[if !mso]><!-->
                    <a href="{invite_url}" target="_blank" style="display: inline-block; background-color: #2563eb; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 600; text-decoration: none; padding-top: 14px; padding-bottom: 14px; padding-left: 48px; padding-right: 48px; border-radius: 8px; letter-spacing: 0.2px;">
                      초대 수락하기
                    </a>
                    <!--<![endif]-->
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- ====== 폴백 링크 영역 ====== -->
          <tr>
            <td style="background-color: #ffffff; padding-top: 0; padding-bottom: 36px; padding-left: 40px; padding-right: 40px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td style="border-top-width: 1px; border-top-style: solid; border-top-color: #e2e8f0; padding-top: 20px;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                      <tr>
                        <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 13px; color: #94a3b8; line-height: 20px;">
                          버튼이 작동하지 않으면 아래 링크를 브라우저에 복사해 주세요.
                        </td>
                      </tr>
                      <tr>
                        <td style="padding-top: 8px; word-break: break-all;">
                          <a href="{invite_url}" target="_blank" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 13px; color: #2563eb; text-decoration: underline; line-height: 20px;">{invite_url}</a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- ====== 하단 라운딩 처리 ====== -->
          <tr>
            <td style="background-color: #ffffff; height: 12px; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; font-size: 0; line-height: 0;">&nbsp;</td>
          </tr>

          <!-- ====== 푸터 ====== -->
          <tr>
            <td style="padding-top: 28px; padding-bottom: 8px; padding-left: 20px; padding-right: 20px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td align="center" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 12px; color: #94a3b8; line-height: 18px; padding-bottom: 6px;">
                    이 이메일은 {org_name} 워크스페이스 초대를 위해 발송되었습니다.
                  </td>
                </tr>
                <tr>
                  <td align="center" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 12px; color: #94a3b8; line-height: 18px; padding-bottom: 6px;">
                    본인이 요청하지 않은 초대라면 이 이메일을 무시해 주세요.
                  </td>
                </tr>
                <tr>
                  <td align="center" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 11px; color: #cbd5e1; line-height: 18px; padding-top: 8px;">
                    &copy; Fabbit
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
        <!--[if mso]>
        </td></tr></table>
        <![endif]-->

      </td>
    </tr>
  </table>

</body>
</html>
