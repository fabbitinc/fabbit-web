name: Deploy Web

on:
  push:
    branches:
      - release
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".node-version"
      - ".github/workflows/deploy-web.yml"

jobs:
  deploy-web:
    name: Deploy fabbit-web
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @fabbit/web build
        env:
          VITE_API_BASE_URL: https://api.fabbit.app
          VITE_APP_DOMAIN: fabbit.app
          VITE_TURNSTILE_SITE_KEY: 0x4AAAAAACaBL2Qxq2neEHgx

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-northeast-2

      - name: Deploy web to S3
        run: |
          aws s3 sync apps/web/dist s3://fabbit-prod-web-edge --delete --exclude index.html \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 cp apps/web/dist/index.html s3://fabbit-prod-web-edge/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"
