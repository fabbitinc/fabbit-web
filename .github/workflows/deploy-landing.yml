name: Deploy Landing

on:
  push:
    branches:
      - release
    paths:
      - "apps/landing/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".node-version"
      - ".github/workflows/deploy-landing.yml"

jobs:
  deploy-landing:
    name: Deploy fabbit-landing
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build landing
        run: pnpm --filter @fabbit/landing build
        env:
          VITE_APP_BASE_URL: https://fabbit.app

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-northeast-2

      - name: Deploy landing to S3
        run: |
          aws s3 sync apps/landing/dist s3://fabbit-prod-landing-edge --delete --exclude index.html \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 cp apps/landing/dist/index.html s3://fabbit-prod-landing-edge/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"
